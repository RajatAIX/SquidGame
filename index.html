<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>SQUID GAME</title>
</head>
<body>
    <main>
        <div class="hero-img">
            <nav class="navbar">
                <div class="left-logo">
                    <span><i class="ri-triangle-line"></i></span>
                    <span><i class="ri-circle-line"></i></span>
                    <span><i class="ri-square-line"></i></span>
                </div>
                <div class="mid-content">
                    <a href="#">About</a>
                    <a href="#">Games</a>
                    <a href="#">Actors</a>
                    <a href="#">History</a>
                </div>
                <div class="right-menu">
                    <span><i class="ri-menu-line"></i></span>
                    <div class="menu">
                        <h3>Menu</h3>
                    </div>
                </div>
            </nav>

            <div class="left">
                <div class="left__logo">
                    <img src="./Images/squid_logo.png" alt="">
                </div>
                <h3>Will You Survive the Game?</h3>
                <p>Discover the games, learn the rules, and join the players.</p>
                <button>Start Playing</button>
            </div>

            <div class="bottom-img">
                <img src="./Images/Squid_character.png" alt="">
            </div>
            
            <div class="right">
                <div class="right__card1">
                    <span><i class="ri-play-circle-fill"></i></span>
                </div>
                <div class="right__card2"></div>
            </div>

            <footer class="footer">
                <div class="play-button">
                    <span><i class="ri-play-circle-line"></i></span>
                    <p>Play Trailor</p>
                </div>
                <div class="track">
                    <div class="track__title">Choose Your Destiny</div>
                    <div class="track__buttons">
                        <div class="track__item">
                            <button class="track__button btn1">Player</button>
                            <p>Fight for your life.</p>
                        </div>
                        <div class="track__item">
                            <button class="track__button btn2">Guard</button>
                            <p>Maintain order in chaos.</p>
                        </div>
                        <div class="track__item">
                            <button class="track__button btn3">VIP</button>
                            <p>Watch the games unfold.</p>
                        </div>
                    </div>
                </div>
                <div class="next-prev">
                    <span><i class="ri-arrow-left-line"></i></span>
                    <span><i class="ri-arrow-right-line"></i></span>
                </div>
            </footer>
        </div>
    </main>
</body>
</html>
